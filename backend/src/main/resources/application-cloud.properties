# Cloud PostgreSQL database profile
spring.datasource.url=${CLOUD_DB_URL:jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:5432/postgres?sslmode=require}
spring.datasource.username=${CLOUD_DB_USERNAME:postgres}
spring.datasource.password=${CLOUD_DB_PASSWORD:}
spring.datasource.driver-class-name=${CLOUD_DB_DRIVER:org.postgresql.Driver}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
